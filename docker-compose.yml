services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: phobert-backend
    ports:
      - "8000:8000"
    environment:
      # LocalAI
      - LOCALAI_URL=http://localai:8080
      - MODEL_NAME=${MODEL_NAME}
      - SECURITY_MODEL_NAME=${SECURITY_MODEL_NAME:-${MODEL_NAME}}
      - MAX_TOKENS=-1
      - PREFER_LOCAL=${PREFER_LOCAL:-false}
      # Cloud LLM (Open Claude)
      - CLOUD_LLM_API_URL=${CLOUD_LLM_API_URL:-https://open-claude.com/v1}
      - CLOUD_MODEL_NAME=${CLOUD_MODEL_NAME:-gpt-5.2}
      - CLOUD_API_KEYS=${CLOUD_API_KEYS}
      # Data paths
      - ISO_DOCS_PATH=/data/iso_documents
      - VECTOR_STORE_PATH=/data/vector_store
      - DATA_PATH=/data
      # Logging
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
      - DEBUG=${DEBUG:-true}
      # Security
      - CORS_ORIGINS=${CORS_ORIGINS:-http://localhost:3000}
      # JWT_SECRET: use a real secret in .env file for production.
      # Dev default triggers a warning (not a hard error) because DEBUG=true.
      - JWT_SECRET=${JWT_SECRET:-change-me-in-production}
      # Rate Limiting
      - RATE_LIMIT_CHAT=${RATE_LIMIT_CHAT:-10/minute}
      - RATE_LIMIT_ASSESS=${RATE_LIMIT_ASSESS:-3/minute}
      - RATE_LIMIT_BENCHMARK=${RATE_LIMIT_BENCHMARK:-5/minute}
      # Performance
      - INFERENCE_TIMEOUT=${INFERENCE_TIMEOUT:-300}
      - CLOUD_TIMEOUT=${CLOUD_TIMEOUT:-60}
    networks:
      - phobert-network
    volumes:
      - ./backend:/app
      - ./data/iso_documents:/data/iso_documents
      - ./data/vector_store:/data/vector_store
      - ./data/assessments:/data/assessments
      - ./data/evidence:/data/evidence
      - ./data/exports:/data/exports
      - ./data/sessions:/data/sessions
      - ./data/standards:/data/standards
      - ./data/knowledge_base:/data/knowledge_base
      - ./data/uploads:/data/uploads
    depends_on:
      localai:
        condition: service_started
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 6G
        reservations:
          memory: 2G
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:8000/health" ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  frontend:
    build:
      context: ./frontend-next
      dockerfile: Dockerfile.dev
    container_name: phobert-frontend
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://backend:8000
      - API_URL=http://backend:8000
      - WATCHPACK_POLLING=true
    volumes:
      - ./frontend-next/src:/app/src
      - ./frontend-next/public:/app/public
      - ./frontend-next/next.config.js:/app/next.config.js
      - ./frontend-next/jsconfig.json:/app/jsconfig.json
      - ./frontend-next/package.json:/app/package.json
      - ./frontend-next/package-lock.json:/app/package-lock.json
    networks:
      - phobert-network
    depends_on:
      backend:
        condition: service_started
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 2G

  localai:
    image: localai/localai:v2.24.2
    container_name: phobert-localai
    ports:
      - "8080:8080"
    environment:
      - DEBUG=true
      - THREADS=${THREADS:-6}
      - CONTEXT_SIZE=${CONTEXT_SIZE:-8192}
      - PARALLEL_REQUESTS=false
      - MLOCK=false
      - MMAP=true
    ulimits:
      memlock: -1
    volumes:
      - ./models/llm:/build/models
    networks:
      - phobert-network
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 12G
        reservations:
          memory: 4G
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:8080/readyz" ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 120s

networks:
  phobert-network:
    driver: bridge
