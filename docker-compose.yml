services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: phobert-backend
    ports:
      - "8000:8000"
    environment:
      - LOCALAI_URL=http://localai:8080
      - MODEL_NAME=${MODEL_NAME}
      - MAX_TOKENS=-1
      - LOG_LEVEL=INFO
    networks:
      - phobert-network
    volumes:
      - ./backend:/app
      - ./data:/data
      - /proc:/host/proc:ro
    depends_on:
      localai:
        condition: service_started
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend-next
      dockerfile: Dockerfile.dev
    container_name: phobert-frontend
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://backend:8000
      - API_URL=http://backend:8000
      - WATCHPACK_POLLING=true
    volumes:
      - ./frontend-next/src:/app/src
      - ./frontend-next/public:/app/public
      - ./frontend-next/next.config.js:/app/next.config.js
      - ./frontend-next/jsconfig.json:/app/jsconfig.json
    networks:
      - phobert-network
    depends_on:
      backend:
        condition: service_started
    restart: unless-stopped

  localai:
    image: localai/localai:v2.24.2
    container_name: phobert-localai
    ports:
      - "8080:8080"
    environment:
      - DEBUG=true
      - THREADS=8
      - CONTEXT_SIZE=8192
    volumes:
      - ./models:/build/models
    networks:
      - phobert-network
    restart: unless-stopped
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:8080/readyz" ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

networks:
  phobert-network:
    driver: bridge
